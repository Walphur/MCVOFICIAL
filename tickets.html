<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCV — Tickets</title>
    <meta name="theme-color" content="#FAA61A">
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="alternate icon" href="favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="mcv-api-base.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
</head>
<body class="grain tickets-page">

<nav class="navbar">
    <a href="index.html" class="logo-link">
        <img src="logo.png" alt="MCV Logo" class="navbar-logo">
        <div class="logo-text">MCV <span>OFICIAL</span></div>
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Clan</a></li>
        <li><a href="events.html">Torneos</a></li>
        <li><a href="bot.html">Bot</a></li>
        <li><a href="tickets.html" class="active">Tickets</a></li>
        <li><a href="live.html" class="live-link"><span class="live-dot pulse-red"></span>Streams</a></li>
    </ul>
</nav>

<section class="page-section">
    <div class="section-label">
        <div class="yellow-line"></div>
        <span>// Soporte y reclutamiento</span>
    </div>
    <h2>Abrí un <span>ticket.</span></h2>

    <div class="form-container">
        <div class="tickets-intro">
            <h3>Cómo funciona</h3>
            <p>Completá el formulario y al enviar te llevamos a Discord para abrir un ticket oficial con el staff (reclutamiento, soporte de torneo o reportes).</p>
        </div>

        <form action="https://discord.gg/mBRrUA8wH6" target="_blank" rel="noopener noreferrer">
            <div class="input-group">
                <label><i data-lucide="tag"></i> Tipo de ticket</label>
                <select required>
                    <option value="">Elegí una opción…</option>
                    <option value="recruit">Reclutamiento (unirte a MCV)</option>
                    <option value="tournament">Soporte de torneo</option>
                    <option value="report">Reporte de jugador</option>
                    <option value="other">Otro</option>
                </select>
            </div>

            <div class="input-group">
                <label><i data-lucide="user"></i> Usuario de Discord</label>
                <input type="text" placeholder="ej. usuario o usuario#0" required autocomplete="username">
            </div>

            <div class="input-group">
                <label><i data-lucide="message-square"></i> Descripción breve</label>
                <textarea placeholder="Motivo del ticket. Si es reclutamiento, contá horas en Rust y rol preferido." required></textarea>
            </div>

            <button type="submit" class="btn-primary w-100"><i data-lucide="send"></i> Ir a Discord</button>
        </form>
    </div>
</section>

<script>lucide.createIcons();</script>
</body>
</html>
