<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCV — Equipo</title>
    <meta name="theme-color" content="#FAA61A">
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="alternate icon" href="../favicon.ico" type="image/png">
    <link rel="stylesheet" href="../style.css?v=17">
    <script src="../mcv-purge-legacy-api.js?v=2"></script>
    <script src="../mcv-api-base.js?v=2"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
</head>
<body class="grain equipo-page" data-mcv-page="team">

<nav class="navbar">
    <a href="../index.html" class="logo-link">
        <img src="../logo.png" alt="MCV Logo" class="navbar-logo">
        <div class="logo-text">MCV <span>OFICIAL</span></div>
    </a>
    <ul class="nav-links">
        <li><a href="../index.html"><span data-i18n="nav.clan">Clan</span></a></li>
        <li><a href="../events.html"><span data-i18n="nav.torneos">Torneos</span></a></li>
        <li><a href="./" class="active"><span data-i18n="nav.team">Equipo</span></a></li>
        <li><a href="../bot.html"><span data-i18n="nav.bot">Bot</span></a></li>
        <li><a href="../tickets.html"><span data-i18n="nav.tickets">Tickets</span></a></li>
        <li><a href="../live.html" class="live-link"><span class="live-dot pulse-red"></span><span data-i18n="nav.streams">Streams</span></a></li>
    </ul>
</nav>

<section class="equipo-hero">
    <div class="section-label centered-label">
        <div class="yellow-line"></div>
        <span data-i18n="team.heroTag">// MCV · Lineup</span>
        <div class="yellow-line"></div>
    </div>
    <h1 class="equipo-hero-title"><span data-i18n="team.heroTitle">Nuestro</span> <span class="equipo-hero-accent" data-i18n="team.heroTitleSpan">equipo.</span></h1>
    <p class="equipo-hero-lead" data-i18n-html="team.heroLead">Tag MCV, roster cerrado: la cara del clan en Rust, torneo y stream.</p>
</section>

<main class="equipo-main">
    <p id="equipo-roster-empty" class="equipo-empty" hidden data-i18n="team.rosterEmpty">Todavía no hay perfiles publicados.</p>
    <p id="equipo-roster-error" class="equipo-error" hidden></p>
    <div id="equipo-roster-grid" class="equipo-roster-grid"></div>
</main>

<footer class="footer">
    <div class="footer-bottom">
        <span data-i18n="footer.copy">© 2026 MCV Clan.</span>
        <a href="../index.html" data-i18n="team.backHome">← Sitio</a>
    </div>
</footer>

<script src="../mcv-i18n.js?v=15"></script>
<script>
(function () {
    var API = typeof mcvResolveApiBase === "function" ? mcvResolveApiBase() : String(window.location.origin || "").replace(/\/$/, "");
    var T = typeof mcvT === "function" ? mcvT : function (k) { return k; };
    var grid = document.getElementById("equipo-roster-grid");
    var empty = document.getElementById("equipo-roster-empty");
    var errEl = document.getElementById("equipo-roster-error");

    function esc(s) {
        if (s == null) return "";
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/"/g, "&quot;");
    }

    /* Mismo tono que el indicador «Streams» (--red / live-dot) */
    var SI = "https://cdn.simpleicons.org";
    var SOC_ICON_HEX = "EF4444";

    function socBrand(href, slug, label) {
        if (!href) return "";
        return (
            '<a class="equipo-soc" href="' +
            esc(href) +
            '" target="_blank" rel="noopener noreferrer" title="' +
            esc(label) +
            '" aria-label="' +
            esc(label) +
            '"><img class="equipo-soc-icon" src="' +
            esc(SI + "/" + slug + "/" + SOC_ICON_HEX) +
            '" alt="" width="20" height="20" loading="lazy"></a>'
        );
    }

    function card(m) {
        var name = esc(m.display_name || "");
        var role = m.role_label ? esc(m.role_label) : "";
        var av = m.avatar_url ? esc(m.avatar_url) : "";
        var sid = m.steam_id64 ? String(m.steam_id64) : "";
        var steamHref = sid ? "https://steamcommunity.com/profiles/" + encodeURIComponent(sid) : "";
        var img = av
            ? '<img class="equipo-card-avatar" src="' + av + '" alt="" width="72" height="72" loading="lazy">'
            : '<div class="equipo-card-avatar equipo-card-avatar-fallback"><i data-lucide="user"></i></div>';
        var soc =
            socBrand(m.twitch_url, "twitch", "Twitch") +
            socBrand(m.kick_url, "kick", "Kick") +
            socBrand(m.x_url, "x", "X / Twitter") +
            socBrand(m.instagram_url, "instagram", "Instagram") +
            socBrand(m.youtube_url, "youtube", "YouTube") +
            socBrand(m.tiktok_url, "tiktok", "TikTok");
        var steamA = steamHref ? socBrand(steamHref, "steam", "Steam") : "";
        var socRow = soc
            ? '<div class="equipo-card-soc-row">' + soc + "</div>"
            : "";
        var roleHtml = role ? '<p class="equipo-card-role">' + role + "</p>" : "";
        var steamSlot = steamA
            ? '<div class="equipo-card-steam-slot">' + steamA + "</div>"
            : "";
        return (
            '<article class="equipo-card">' +
            '<div class="equipo-card-top">' +
            steamSlot +
            '<div class="equipo-card-media">' +
            img +
            "</div>" +
            '<div class="equipo-card-id">' +
            "<h3>" +
            name +
            "</h3>" +
            roleHtml +
            "</div>" +
            "</div>" +
            socRow +
            "</article>"
        );
    }

    function loadRoster() {
        if (!API) {
            errEl.textContent = T("team.noApi");
            errEl.hidden = false;
            return;
        }
        errEl.hidden = true;
        fetch(API + "/api/team-roster")
            .then(function (r) {
                return r.json();
            })
            .then(function (d) {
                var list = d.members || [];
                if (!list.length) {
                    empty.hidden = false;
                    grid.innerHTML = "";
                    lucide.createIcons();
                    return;
                }
                empty.hidden = true;
                grid.innerHTML = list.map(card).join("");
                lucide.createIcons();
            })
            .catch(function () {
                errEl.textContent = T("team.loadError");
                errEl.hidden = false;
                lucide.createIcons();
            });
    }

    lucide.createIcons();
    loadRoster();
})();
</script>
</body>
</html>
