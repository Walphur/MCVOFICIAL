<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>MCV Control Room</title>
  <link rel="stylesheet" href="style.css?v=20260501" />
  <link rel="stylesheet" href="admin-v2.css?v=20260501" />
</head>
<body class="mcv-admin">
  <header class="mcv-topbar">
    <div class="brand">🔒 <span data-i18n="brand">MCV CONTROL ROOM</span> <small>// ADMIN@MCV.GG</small></div>
    <div class="actions">
      <button id="langBtn" class="ghost">EN</button>
      <button id="refreshBtn" class="ghost" data-i18n="refresh">REFRESH</button>
      <button id="resetBtn" class="danger" data-i18n="reset">RESET</button>
      <a href="login.html" class="ghost" data-i18n="logout">LOGOUT</a>
    </div>
  </header>

  <main class="mcv-wrap">
    <section class="hero">
      <p data-i18n="label">// TEAMS MANAGEMENT</p>
      <h1 data-i18n="title">CONTROL <span>ROOM.</span></h1>
      <p data-i18n="subtitle">Review registrations, manage brackets, export rosters.</p>
      <div class="hero-actions">
        <button id="addBtn" class="ghost" data-i18n="add">ADD TEAM</button>
        <button id="exportBtn" class="primary" data-i18n="export">EXPORT CSV</button>
      </div>
    </section>

    <section class="toolbar">
      <input id="q" type="text" placeholder="Search team..." />
      <select id="sort">
        <option value="new">Newest</option>
        <option value="name">Name A-Z</option>
        <option value="players">Most players</option>
      </select>
    </section>

    <section class="filters">
      <button data-filter="all" class="active"><b data-i18n="all">ALL</b><span>0</span></button>
      <button data-filter="pending"><b data-i18n="pending">PENDING</b><span>0</span></button>
      <button data-filter="approved"><b data-i18n="approved">APPROVED</b><span>0</span></button>
      <button data-filter="rejected"><b data-i18n="rejected">REJECTED</b><span>0</span></button>
    </section>

    <section id="cards" class="cards"></section>
    <section id="empty" class="empty" data-i18n="empty">NO TEAMS IN THIS VIEW.</section>
  </main>

  <dialog id="teamDlg">
    <form id="teamForm" method="dialog" class="form">
      <h3 data-i18n="team">TEAM</h3>
      <label><span data-i18n="teamName">Team name</span><input id="teamName" required /></label>
      <label><span data-i18n="captain">Captain</span><input id="captain" required /></label>
      <label><span data-i18n="players">Players</span><input id="players" type="number" min="1" max="16" required /></label>
      <label><span data-i18n="status">Status</span>
        <select id="status"><option value="pending">pending</option><option value="approved">approved</option><option value="rejected">rejected</option></select>
      </label>
      <label><span data-i18n="notes">Notes</span><textarea id="notes"></textarea></label>
      <div class="roster-grid"><label><span>Player 1</span><input id="p1" /></label><label><span>SteamID 1</span><input id="sid1" /></label><label><span>Player 2</span><input id="p2" /></label><label><span>SteamID 2</span><input id="sid2" /></label><label><span>Player 3</span><input id="p3" /></label><label><span>SteamID 3</span><input id="sid3" /></label><label><span>Player 4</span><input id="p4" /></label><label><span>SteamID 4</span><input id="sid4" /></label><label><span>Player 5</span><input id="p5" /></label><label><span>SteamID 5</span><input id="sid5" /></label></div>

      <div class="row">
        <button class="primary" type="submit" data-i18n="save">SAVE</button>
        <button class="ghost" type="button" id="cancelBtn" data-i18n="cancel">CANCEL</button>
      </div>
    </form>
  </dialog>

  <script src="admin-v2.js?v=20260501"></script>
</body>
</html>
