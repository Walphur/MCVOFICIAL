<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Control Room - MCV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <nav class="admin-navbar">
        <div class="admin-logo">🔒 MCV CONTROL ROOM <span>// ADMIN@MCV.GG</span></div>
        <div class="admin-actions">
            <button class="btn-outline">🔄 REFRESH</button>
            <a href="login.html"><button class="btn-outline">🚪 LOGOUT</button></a>
        </div>
    </nav>

    <main class="admin-main">
        <header class="dashboard-header">
            <div>
                <span class="tagline">// TEAMS MANAGEMENT</span>
                <h1>CONTROL <span>ROOM.</span></h1>
                <p>Review registrations, manage brackets, export rosters.</p>
            </div>
            <div class="dashboard-buttons">
                <button class="btn-primary-small">📥 EXPORT CSV</button>
                <button class="btn-danger">🛑 RESET</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active">👑 TEAMS</button>
            <button class="tab">⚔️ BRACKET</button>
        </div>

        <div class="filters">
            <button class="filter active">ALL <span>0</span></button>
            <button class="filter">PENDING <span>0</span></button>
            <button class="filter">APPROVED <span>0</span></button>
            <button class="filter">REJECTED <span>0</span></button>
        </div>

        <div class="data-area empty-state">
            <p>NO TEAMS IN THIS VIEW.</p>
        </div>
    </main>

</body>
</html>
