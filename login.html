<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MCV</title>
    <meta name="theme-color" content="#FAA61A">
    <!-- Si mcvoficial.com (u otro) es solo estático y da 405 en /api, poné aquí la URL del Web Service en Render, sin barra final. -->
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="alternate icon" href="favicon.ico" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=29">
    <link rel="stylesheet" href="style-admin.css?v=1">
</head>
<body class="login-body" data-mcv-page="login">

    <div class="login-container">
        <div class="login-brand">
            <img src="logo.png" width="48" height="48" alt="">
            <div>
                <span class="tagline" data-i18n="login.tagline">// MCV ADMIN</span>
                <h2 data-i18n="login.title">CONTROL ROOM</h2>
            </div>
        </div>

        <p id="login-error" class="login-error" role="alert"></p>
        <p id="login-diag" class="login-diag" role="status"></p>

        <form class="login-form" id="login-form">
            <div class="input-group">
                <label for="login-password" data-i18n="login.passwordLabel">Contraseña de entorno</label>
                <input id="login-password" type="password" name="password" autocomplete="current-password" required data-i18n-placeholder="login.passwordPh" placeholder="ADMIN_PASSWORD del servidor">
            </div>
            <button type="submit" class="btn-primary login-submit" data-i18n="login.submit">Entrar al panel</button>
        </form>

        <p class="login-hint" data-i18n-html="login.hint1Html"></p>
        <p class="login-hint login-hint-api" data-i18n-html="login.hint2Html"></p>

        <div class="login-footer-links">
            <a href="index.html" class="back-link" data-i18n="login.backSite">← Sitio público</a>
            <a href="events.html" class="back-link" data-i18n="login.backEvents">Torneos</a>
        </div>
    </div>

    <!-- Si tu Web Service en Render tiene otra URL: copiá mcv-local-api.example.js → mcv-local-api.js, editá la URL y descomentá la línea de abajo (antes de mcv-api-base.js). -->
    <!-- <script src="mcv-local-api.js"></script> -->
<script src="mcv-purge-legacy-api.js?v=2"></script>
<script src="mcv-api-base.js?v=2"></script>
<script src="mcv-i18n.js?v=26"></script>
<script>
(function () {
    var form = document.getElementById('login-form');
    var err = document.getElementById('login-error');
    var diag = document.getElementById('login-diag');
    var T = typeof mcvT === 'function' ? mcvT : function (k) { return k; };
    var tpl = typeof mcvTpl === 'function' ? mcvTpl : function (k, v) { return T(k); };

    function apiBase() {
        return typeof mcvResolveApiBase === 'function' ? mcvResolveApiBase() : String(window.location.origin || '').replace(/\/$/, '');
    }

    function fetchRetry(url, options, maxAttempts) {
        maxAttempts = maxAttempts || 5;
        var delayMs = 2200;
        function attempt(n) {
            return fetch(url, options || {}).catch(function (err) {
                if (n >= maxAttempts) throw err;
                return new Promise(function (resolve) {
                    setTimeout(function () { resolve(attempt(n + 1)); }, delayMs);
                });
            });
        }
        return attempt(1);
    }

    function runDiag() {
        var API = apiBase();
        diag.textContent = '';
        diag.style.display = 'none';
        if (!API) {
            diag.textContent = T('login.diagNoApiUrl');
            diag.style.display = 'block';
            return;
        }
        diag.textContent = T('login.diagChecking');
        diag.style.display = 'block';
        fetchRetry(API + '/api/auth/status', { cache: 'no-store' })
            .then(function (r) { return r.text().then(function (t) { return { ok: r.ok, t: t, status: r.status }; }); })
            .then(function (x) {
                if (x.status === 404 || x.status === 502) {
                    var trimmed = String(x.t || '').trim();
                    if (trimmed === 'Not Found' || (trimmed && trimmed.charAt(0) !== '{')) {
                        diag.textContent = tpl('login.diagRenderPlain404', { api: API });
                        return;
                    }
                }
                if (x.status === 405) {
                    diag.textContent = tpl('login.diag405', { status: x.status, api: API });
                    return;
                }
                var d = {};
                try { d = x.t ? JSON.parse(x.t) : {}; } catch (e) { d = {}; }
                if (!x.ok || d.loginPossible == null) {
                    diag.textContent = tpl('login.diagStatusRead', { status: x.status, api: API });
                    return;
                }
                var parts = [];
                parts.push(tpl('login.diagLineApi', { api: API }));
                if (!d.hasAdminPassword) parts.push(T('login.diagAdminMissing'));
                if (!d.hasJwtSecret || !d.jwtLengthOk) parts.push(T('login.diagJwtMissing'));
                if (d.jwtHadWhitespace) parts.push(T('login.diagJwtWs'));
                if (!d.hasDatabaseUrl) parts.push(T('login.diagDbMissing'));
                if (d.loginPossible) parts.push(T('login.diagLoginOk'));
                diag.textContent = parts.join(' ');
            })
            .catch(function () {
                diag.textContent = tpl('login.diagNoConnect', { api: API });
            });
    }

    var qs = new URLSearchParams(window.location.search || '');
    if (qs.get('expired') === '1') {
        err.textContent = T('login.errExpired');
        err.style.display = 'block';
    }

    runDiag();

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        err.style.display = 'none';
        err.textContent = '';
        var API = apiBase();
        if (!API) {
            err.textContent = T('login.errNoApiUrl');
            err.style.display = 'block';
            return;
        }
        var pw = form.password.value;
        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        fetchRetry(API + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw }),
            cache: 'no-store'
        })
            .then(function (r) {
                return r.text().then(function (text) {
                    if (r.status === 405 || r.status === 404) {
                        err.textContent = tpl('login.err405', { status: r.status });
                        err.style.display = 'block';
                        throw new Error('bad-route');
                    }
                    var d = {};
                    try {
                        d = text ? JSON.parse(text) : {};
                    } catch (ignore) {
                        err.textContent = tpl('login.errBadJson', { api: API, status: r.status });
                        err.style.display = 'block';
                        throw new Error('parse');
                    }
                    return { ok: r.ok, d: d };
                });
            })
            .then(function (x) {
                if (!x.ok || !x.d.token) {
                    err.textContent = (x.d && x.d.error) ? x.d.error : T('login.errLoginFailed');
                    err.style.display = 'block';
                    return;
                }
                var tok = String(x.d.token).trim();
                sessionStorage.setItem('mcv_admin_jwt', tok);
                try { localStorage.setItem('mcv_admin_jwt', tok); } catch (ignore) {}
                window.location.href = 'admin.html';
            })
            .catch(function (e) {
                if (e && (e.message === 'parse' || e.message === 'bad-route')) return;
                err.textContent = T('login.errNoConnectRetry');
                err.style.display = 'block';
            })
            .finally(function () {
                btn.disabled = false;
            });
    });
})();
</script>
</body>
</html>
