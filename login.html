<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <meta charset="UTF-8">
    <title>Admin Login - MCV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <div class="icon">🔒</div>
            <div>
                <span class="tagline">// MCV ADMIN</span>
                <h2>CONTROL ROOM</h2>
            </div>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" placeholder="admin@mcv.gg" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" required>
            </div>
            <a href="admin.html"><button type="button" class="btn-primary w-100">ENTER CONTROL ROOM</button></a>
        </form>

        <a href="index.html" class="back-link">← BACK TO TOURNAMENT SITE</a>
    </div>

</body>
