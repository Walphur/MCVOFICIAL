<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MCV</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#FAA61A">
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="alternate icon" href="favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css?v=2026-06-20-v6">
    <link rel="stylesheet" href="mds-tokens.css?v=2026-06-20-v6">
    <link rel="stylesheet" href="mds-components.css?v=2026-06-20-v6">
    <link rel="stylesheet" href="mds-premium.css?v=2026-06-20-v6">
    <link rel="stylesheet" href="style-admin.css?v=2026-06-20-v6">
</head>
<body class="login-body" data-mcv-page="login">

    <div class="login-container mcv-card mcv-auth-card">
        <div class="login-brand">
            <img src="logo.png" width="48" height="48" alt="MCV">
            <div>
                <span class="tagline mcv-eyebrow" data-i18n="login.tagline">// Acceso restringido</span>
                <h2 data-i18n="login.title">MCV CONTROL ROOM</h2>
            </div>
        </div>

        <p id="login-error" class="login-error mcv-form-msg mcv-form-msg--err" role="alert"></p>
        <p id="login-diag" class="login-diag" role="status" hidden></p>

        <form class="login-form mcv-form" id="login-form">
            <div class="mcv-field input-group">
                <label class="mcv-field__label" for="login-password" data-i18n="login.passwordLabel">Contraseña</label>
                <input class="mcv-input" id="login-password" type="password" name="password" autocomplete="current-password" required data-i18n-placeholder="login.passwordPh" placeholder="••••••••••">
            </div>
            <div id="login-turnstile" class="login-turnstile" hidden></div>
            <button type="submit" class="mcv-btn mcv-btn--primary btn-primary login-submit" data-i18n="login.submit">Ingresar</button>
        </form>

        <div id="login-oauth" class="login-oauth">
            <span class="login-oauth__sep">o</span>
            <a id="login-steam-btn" class="mcv-oauth-btn mcv-oauth-btn--steam btn-outline login-oauth__btn" href="#" hidden>Continuar con Steam</a>
            <a id="login-google-btn" class="mcv-oauth-btn mcv-oauth-btn--google btn-outline login-oauth__btn" href="#">Continuar con Google</a>
        </div>

        <details id="login-google-setup" class="login-hint-oauth" hidden>
            <summary>Configuración Google OAuth</summary>
            <p>
                Si Google muestra <strong>redirect_uri_mismatch</strong>, agregá esta URI en
                <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener noreferrer">Google Cloud Console</a>:
                <code id="login-google-uri"></code>
            </p>
        </details>

        <div class="login-footer-links">
            <a href="index.html" class="mcv-link mcv-link--muted back-link" data-i18n="login.backSite">← Sitio público</a>
            <a href="events.html" class="mcv-link mcv-link--accent back-link" data-i18n="login.backEvents">Torneos</a>
        </div>
    </div>

<script src="mcv-assets.js?v=2026-06-20-v6"></script>
<script src="mcv-purge-legacy-api.js?v=2"></script>
<script src="mcv-api-base.js?v=2"></script>
<script src="mcv-oauth-ui.js?v=1"></script>
<script src="mcv-i18n.js?v=28"></script>
<script>
(function () {
    var form = document.getElementById('login-form');
    var err = document.getElementById('login-error');
    var diag = document.getElementById('login-diag');
    var T = typeof mcvT === 'function' ? mcvT : function (k) { return k; };
    var tpl = typeof mcvTpl === 'function' ? mcvTpl : function (k, v) { return T(k); };

    function apiBase() {
        return typeof mcvResolveApiBase === 'function' ? mcvResolveApiBase() : String(window.location.origin || '').replace(/\/$/, '');
    }

    function fetchRetry(url, options, maxAttempts) {
        maxAttempts = maxAttempts || 5;
        var delayMs = 2200;
        function attempt(n) {
            return fetch(url, options || {}).catch(function (err) {
                if (n >= maxAttempts) throw err;
                return new Promise(function (resolve) {
                    setTimeout(function () { resolve(attempt(n + 1)); }, delayMs);
                });
            });
        }
        return attempt(1);
    }

    var qs = new URLSearchParams(window.location.search || '');
    if (qs.get('expired') === '1') {
        err.textContent = T('login.errExpired');
        err.style.display = 'block';
    }
    var oauthErr = qs.get('oauth_error');
    if (oauthErr) {
        var oauthMsgs = {
            not_allowed: 'Tu cuenta Steam o Google no está autorizada para el panel admin.',
            invalid_state: 'Sesión OAuth expirada. Intentá de nuevo.',
            steam_verify: 'No se pudo verificar Steam. Intentá de nuevo.',
            google_failed: 'Error con Google. Intentá de nuevo.'
        };
        err.textContent = oauthMsgs[oauthErr] || ('Error de acceso (' + oauthErr + ').');
        err.style.display = 'block';
    }

    var turnstileSiteKey = '';
    var turnstileWidgetId = null;
    var turnstileToken = '';

    function resetTurnstile() {
        turnstileToken = '';
        if (turnstileWidgetId != null && window.turnstile && typeof window.turnstile.reset === 'function') {
            try { window.turnstile.reset(turnstileWidgetId); } catch (ignore) {}
        }
    }

    function loadTurnstileScript() {
        return new Promise(function (resolve, reject) {
            if (window.turnstile) {
                resolve();
                return;
            }
            var s = document.createElement('script');
            s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
            s.async = true;
            s.defer = true;
            s.onload = function () { resolve(); };
            s.onerror = function () { reject(new Error('turnstile-script')); };
            document.head.appendChild(s);
        });
    }

    function setupOAuthButtons(API, cfg) {
        if (typeof mcvBindAdminOAuthButtons === "function") {
            mcvBindAdminOAuthButtons({
                api: API,
                wrapEl: "login-oauth",
                steamEl: "login-steam-btn",
                googleEl: "login-google-btn",
                opts: cfg || { googleLoginEnabled: true, steamLoginEnabled: false }
            });
        }
        var googleSetup = document.getElementById('login-google-setup');
        var googleUri = document.getElementById('login-google-uri');
        var googleOn = cfg && cfg.googleLoginEnabled;
        if (googleOn && googleSetup && googleUri) {
            var uri = (cfg && cfg.googleAdminRedirectUri) ? cfg.googleAdminRedirectUri : (API + '/api/auth/google/callback');
            googleUri.textContent = uri;
            googleSetup.hidden = false;
        } else if (googleSetup) {
            googleSetup.hidden = true;
        }
        if (googleOn && cfg && cfg.oauthPublicBaseConfigured === false && diag) {
            diag.hidden = false;
            diag.textContent = 'Aviso: falta OAUTH_PUBLIC_BASE_URL en Render. Configurá https://mcvoficial.com para evitar redirect_uri_mismatch.';
        }
    }

    var API_BOOT = apiBase();
    if (API_BOOT) {
        setupOAuthButtons(API_BOOT, { googleLoginEnabled: true, steamLoginEnabled: false });
    }

    function initTurnstile(API) {
        var box = document.getElementById('login-turnstile');
        return fetchRetry(API + '/api/auth/login-config', { cache: 'no-store' })
            .then(function (r) { return r.json(); })
            .then(function (cfg) {
                setupOAuthButtons(API, cfg);
                turnstileSiteKey = cfg && cfg.turnstileSiteKey ? String(cfg.turnstileSiteKey).trim() : '';
                if (!turnstileSiteKey || !box) {
                    if (box) box.hidden = true;
                    return;
                }
                return loadTurnstileScript().then(function () {
                    box.hidden = false;
                    turnstileWidgetId = window.turnstile.render(box, {
                        sitekey: turnstileSiteKey,
                        theme: 'dark',
                        callback: function (token) { turnstileToken = token; },
                        'expired-callback': function () { turnstileToken = ''; },
                        'error-callback': function () { turnstileToken = ''; }
                    });
                }).catch(function () {
                    if (box) box.hidden = true;
                });
            })
            .catch(function () {
                if (box) box.hidden = true;
            });
    }

    var API_INIT = apiBase();
    if (API_INIT) {
        initTurnstile(API_INIT).catch(function () {});
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        err.style.display = 'none';
        err.textContent = '';
        var API = apiBase();
        if (!API) {
            err.textContent = T('login.errNoApiUrl');
            err.style.display = 'block';
            return;
        }
        var pw = form.password.value;
        if (turnstileSiteKey && !turnstileToken) {
            err.textContent = 'Completá la verificación anti-bot antes de ingresar.';
            err.style.display = 'block';
            return;
        }
        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        var payload = { password: pw };
        if (turnstileToken) payload.turnstileToken = turnstileToken;
        fetchRetry(API + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            cache: 'no-store'
        })
            .then(function (r) {
                return r.text().then(function (text) {
                    if (r.status === 405 || r.status === 404) {
                        err.textContent = tpl('login.err405', { status: r.status });
                        err.style.display = 'block';
                        throw new Error('bad-route');
                    }
                    var d = {};
                    try {
                        d = text ? JSON.parse(text) : {};
                    } catch (ignore) {
                        err.textContent = tpl('login.errBadJson', { api: API, status: r.status });
                        err.style.display = 'block';
                        throw new Error('parse');
                    }
                    return { ok: r.ok, d: d };
                });
            })
            .then(function (x) {
                if (!x.ok || !x.d.token) {
                    err.textContent = (x.d && x.d.error) ? x.d.error : T('login.errLoginFailed');
                    err.style.display = 'block';
                    resetTurnstile();
                    return;
                }
                var tok = String(x.d.token).trim();
                sessionStorage.setItem('mcv_admin_jwt', tok);
                try { localStorage.removeItem('mcv_admin_jwt'); } catch (ignore) {}
                window.location.href = 'admin.html';
            })
            .catch(function (e) {
                if (e && (e.message === 'parse' || e.message === 'bad-route')) return;
                err.textContent = T('login.errNoConnectRetry');
                err.style.display = 'block';
                resetTurnstile();
            })
            .finally(function () {
                btn.disabled = false;
            });
    });
})();
</script>
</body>
</html>
