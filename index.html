<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCV Oficial - Rust Clan & Events</title>
    <meta property="og:title" content="MCV Oficial - Rust Clan & Events">
    <meta property="og:description" content="Clan competitivo de Rust — torneos, streams y plataforma competitiva.">
    <meta property="og:image" content="banner.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#FAA61A">
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="alternate icon" href="favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css?v=2026-06-20-v9">
    <script src="mcv-assets.js?v=2026-06-20-v9"></script>
    <script src="mcv-purge-legacy-api.js?v=2"></script>
    <script src="mcv-api-base.js?v=2"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="mcv-layout.js?v=2026-06-20-v9" defer></script>
</head>
<body class="grain home-page" data-mcv-page="index">

<nav class="navbar" data-mcv-shell-nav></nav>

<section class="mcv-hero home-hero home-hero--hub" id="mcv-main">
    <div class="mcv-hero__bg home-hero-media" aria-hidden="true"></div>
    <div class="mcv-hero__shade home-hero-shade" aria-hidden="true"></div>

    <div class="mcv-hero__content home-hero-content home-hero-content--hub">
        <div id="home-hero-now" class="home-hero-now" aria-live="polite">
            <div class="mcv-skeleton home-hero-skeleton" aria-hidden="true"></div>
        </div>

        <div class="home-hero-minimal">
            <img src="logo.png" alt="" class="home-mark" width="56" height="56">
            <h1>MCV <span>OFICIAL</span></h1>
            <p class="home-lead-short">¿Qué está pasando en MCV ahora mismo?</p>
        </div>

        <button type="button" id="home-search-open" class="mcv-btn mcv-btn--secondary home-search-btn" aria-label="Buscar (Ctrl+K)">
            <i data-lucide="search"></i>
            <span>Buscar</span>
            <kbd class="home-search-kbd">Ctrl+K</kbd>
        </button>
    </div>
</section>

<section class="home-snapshot home-snapshot--compact">
    <div class="mcv-stat-bar stats-bar home-stats">
        <div class="mcv-stat stat-box">
            <span class="mcv-stat__label stat-title">Torneos</span>
            <span class="mcv-stat__value stat-value mcv-count-up" id="stat-hosted-count">—</span>
        </div>
        <div class="mcv-stat stat-box">
            <span class="mcv-stat__label stat-title">Discord</span>
            <span class="mcv-stat__value stat-value mcv-count-up" id="discord-total">—</span>
        </div>
        <div class="mcv-stat stat-box">
            <span class="mcv-stat__label stat-title">Online</span>
            <span class="mcv-stat__value stat-value mcv-count-up" id="discord-online">—</span>
        </div>
    </div>
</section>

<main class="home-hub">
    <section class="mcv-widget-section home-section">
        <header class="mcv-widget-section__head">
            <h2 class="mcv-widget-section__title"><i data-lucide="activity"></i> Actividad reciente</h2>
        </header>
        <div id="home-activity-feed" class="mcv-widget-activity-list">
            <div class="mcv-skeleton" aria-hidden="true"></div>
        </div>
    </section>

    <div class="home-hub-grid">
        <section class="mcv-widget-section home-section">
            <header class="mcv-widget-section__head">
                <h2 class="mcv-widget-section__title"><i data-lucide="calendar-clock"></i> Próximos eventos</h2>
                <a class="mcv-link mcv-widget-section__link" href="calendar/">Calendario</a>
            </header>
            <div id="home-upcoming-list" class="home-widget-scroll">
                <div class="mcv-skeleton" aria-hidden="true"></div>
            </div>
        </section>

        <section class="mcv-widget-section home-section">
            <header class="mcv-widget-section__head">
                <h2 class="mcv-widget-section__title"><i data-lucide="trophy"></i> Resultados recientes</h2>
                <a class="mcv-link mcv-widget-section__link" href="results/">Ver todos</a>
            </header>
            <div id="home-results-list" class="home-widget-scroll">
                <div class="mcv-skeleton" aria-hidden="true"></div>
            </div>
        </section>
    </div>

    <div class="home-hub-grid home-hub-grid--triple">
        <section class="mcv-widget-section home-section">
            <header class="mcv-widget-section__head">
                <h2 class="mcv-widget-section__title"><i data-lucide="medal"></i> Top jugadores</h2>
                <a class="mcv-link mcv-widget-section__link" href="standings/">Ranking</a>
            </header>
            <div id="home-top-players" class="mcv-widget-player-list">
                <div class="mcv-skeleton" aria-hidden="true"></div>
            </div>
        </section>

        <section class="mcv-widget-section home-section">
            <header class="mcv-widget-section__head">
                <h2 class="mcv-widget-section__title"><i data-lucide="users"></i> Clan</h2>
                <a class="mcv-link mcv-widget-section__link" href="equipo/">Equipo</a>
            </header>
            <div id="home-clan-widget">
                <div class="mcv-skeleton" aria-hidden="true"></div>
            </div>
        </section>

        <section class="mcv-widget-section home-section home-section--discord">
            <div id="home-discord-widget">
                <div class="mcv-skeleton" aria-hidden="true"></div>
            </div>
        </section>
    </div>
</main>

<script src="mcv-components.js?v=2026-06-20-v9"></script>
<script src="mcv-compete-core.js?v=2026-06-20-v9"></script>
<script src="mcv-home-widgets.js?v=2026-06-20-v9"></script>
<script src="mcv-home-view.js?v=2026-06-20-v9"></script>
</body>
</html>
