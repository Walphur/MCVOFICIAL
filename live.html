<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCV — Streams en vivo</title>
    <meta name="theme-color" content="#FAA61A">
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="alternate icon" href="favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css?v=29">
    <meta name="description" content="Streams en vivo de MCV: Kick y Twitch oficiales del clan Rust.">
    <meta property="og:title" content="MCV — Streams en vivo">
    <meta property="og:image" content="banner.png">
    <script src="mcv-purge-legacy-api.js?v=2"></script>
    <script src="mcv-api-base.js?v=2"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="mcv-layout.js?v=3" defer></script>
</head>
<body class="grain live-page" data-mcv-page="live">

<nav class="navbar" data-mcv-shell-nav></nav>
<main class="page-section live-layout">
    <div class="section-label">
        <div class="yellow-line"></div>
        <span data-i18n="live.sectionTag">// Cobertura en vivo</span>
    </div>
    <h1 class="live-heading"><span data-i18n="live.heading">MCV </span><span data-i18n="live.headingSpan">Live.</span></h1>
    <p class="live-lead" data-i18n="live.lead">Kick y Twitch oficiales del clan. Si el embed de Twitch no carga, revisá bloqueadores o probá desde mcvoficial.com.</p>

    <div class="live-streams">
        <article class="live-stream-card">
            <div class="stream-frame-wrap">
                <iframe src="https://player.kick.com/mcompanyv" title="Kick MCV" allowfullscreen></iframe>
            </div>
            <div class="live-stream-meta kick">
                <h3><i data-lucide="radio"></i> <span data-i18n="live.kickTitle">Kick — principal</span></h3>
                <span id="kick-live-badge" class="live-status-badge" data-i18n="live.checking">Comprobando…</span>
            </div>
        </article>

        <article class="live-stream-card">
            <div class="stream-frame-wrap" id="twitch-mount"></div>
            <div class="live-stream-meta twitch">
                <h3><i data-lucide="twitch"></i> <span data-i18n="live.twitchTitle">Twitch — clan oficial</span></h3>
                <span id="twitch-live-badge" class="live-status-badge" data-i18n="live.checking">Comprobando…</span>
            </div>
        </article>
    </div>
</main>

<script src="mcv-i18n.js?v=26"></script>
<script>
(function () {
    var T = typeof mcvT === "function" ? mcvT : function (k) { return k; };
    lucide.createIcons();
    var ch = "mcvteam";
    var parents = ["mcvoficial.com", "www.mcvoficial.com", "127.0.0.1", "localhost"];
    var h = location.hostname;
    if (h && parents.indexOf(h) === -1) parents.push(h);
    var q = parents.map(function (p) { return "parent=" + encodeURIComponent(p); }).join("&");
    var src = "https://player.twitch.tv/?channel=" + encodeURIComponent(ch) + "&" + q;
    var el = document.getElementById("twitch-mount");
    if (el) {
        el.innerHTML = '<iframe src="' + src + '" title="Twitch MCV" allowfullscreen></iframe>';
    }

    function setBadge(id, live) {
        var b = document.getElementById(id);
        if (!b) return;
        b.textContent = live ? T("live.statusLive") : T("live.statusOffline");
        b.classList.toggle("is-live", !!live);
        b.classList.toggle("is-offline", !live);
    }

    fetch("https://decapi.me/twitch/status/" + encodeURIComponent(ch))
        .then(function (r) { return r.text(); })
        .then(function (txt) {
            var s = String(txt || "").toLowerCase();
            setBadge("twitch-live-badge", s.indexOf("live") !== -1 || s.indexOf("online") !== -1);
        })
        .catch(function () {
            setBadge("twitch-live-badge", false);
        });

    fetch("https://decapi.me/kick/status/mcompanyv")
        .then(function (r) { return r.text(); })
        .then(function (txt) {
            var s = String(txt || "").toLowerCase();
            setBadge("kick-live-badge", s.indexOf("live") !== -1 || s.indexOf("online") !== -1);
        })
        .catch(function () {
            setBadge("kick-live-badge", false);
        });
})();
</script>
</body>
</html>
