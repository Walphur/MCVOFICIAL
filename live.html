<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCV — Streams en vivo</title>
    <meta name="theme-color" content="#FAA61A">
    <meta name="mcv-api" content="">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="alternate icon" href="favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="mcv-purge-legacy-api.js?v=2"></script>
    <script src="mcv-api-base.js?v=2"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
</head>
<body class="grain live-page" data-mcv-page="live">

<nav class="navbar">
    <a href="index.html" class="logo-link">
        <img src="logo.png" alt="MCV Logo" class="navbar-logo">
        <div class="logo-text">MCV <span>OFICIAL</span></div>
    </a>
    <ul class="nav-links">
        <li><a href="index.html"><span data-i18n="nav.clan">Clan</span></a></li>
        <li><a href="events.html"><span data-i18n="nav.torneos">Torneos</span></a></li>
        <li><a href="equipo/"><span data-i18n="nav.team">Equipo</span></a></li>
        <li><a href="bot.html"><span data-i18n="nav.bot">Bot</span></a></li>
        <li><a href="tickets.html"><span data-i18n="nav.tickets">Tickets</span></a></li>
        <li><a href="live.html" class="live-link active"><span class="live-dot pulse-red"></span><span data-i18n="nav.streams">Streams</span></a></li>
    </ul>
</nav>

<main class="page-section live-layout">
    <div class="section-label">
        <div class="yellow-line"></div>
        <span data-i18n="live.sectionTag">// Cobertura en vivo</span>
    </div>
    <h1 class="live-heading"><span data-i18n="live.heading">MCV </span><span data-i18n="live.headingSpan">Live.</span></h1>
    <p class="live-lead" data-i18n="live.lead">Kick y Twitch oficiales del clan. Si el embed de Twitch no carga, revisá bloqueadores o probá desde mcvoficial.com.</p>

    <div class="live-streams">
        <article class="live-stream-card">
            <div class="stream-frame-wrap">
                <iframe src="https://player.kick.com/mcompanyv" title="Kick MCV" allowfullscreen></iframe>
            </div>
            <div class="live-stream-meta kick">
                <h3><i data-lucide="radio"></i> <span data-i18n="live.kickTitle">Kick — principal</span></h3>
            </div>
        </article>

        <article class="live-stream-card">
            <div class="stream-frame-wrap" id="twitch-mount"></div>
            <div class="live-stream-meta twitch">
                <h3><i data-lucide="twitch"></i> <span data-i18n="live.twitchTitle">Twitch — clan oficial</span></h3>
            </div>
        </article>
    </div>
</main>

<script src="mcv-i18n.js?v=2"></script>
<script>
(function () {
    lucide.createIcons();
    var ch = "mcvteam";
    var parents = ["mcvoficial.com", "www.mcvoficial.com", "127.0.0.1", "localhost"];
    var h = location.hostname;
    if (h && parents.indexOf(h) === -1) parents.push(h);
    var q = parents.map(function (p) { return "parent=" + encodeURIComponent(p); }).join("&");
    var src = "https://player.twitch.tv/?channel=" + encodeURIComponent(ch) + "&" + q;
    var el = document.getElementById("twitch-mount");
    if (el) {
        el.innerHTML = '<iframe src="' + src + '" title="Twitch MCV" allowfullscreen></iframe>';
    }
})();
</script>
</body>
</html>
